<!DOCTYPE html>
<html>
<head>
    <title>Add Class</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#43cea2,#185a9d);
        }

        .card{
            background:white;
            padding:40px;
            width:350px;
            border-radius:15px;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            margin-bottom:25px;
            color:#333;
        }

        input[type="text"]{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            font-size:15px;
            transition:0.3s;
        }

        input[type="text"]:focus{
            border-color:#185a9d;
            box-shadow:0 0 8px rgba(24,90,157,0.3);
        }

        input[type="submit"]{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:8px;
            background:#185a9d;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        input[type="submit"]:hover{
            background:#0d3c73;
        }

        .back{
            display:inline-block;
            margin-top:20px;
            text-decoration:none;
            color:#185a9d;
            font-weight:bold;
            transition:0.3s;
        }

        .back:hover{
            color:#0d3c73;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Add Class</h2>

    <form method="post">
        <input type="text" name="name" placeholder="Enter Class Name" required>
        <input type="submit" value="Add Class">
    </form>

    <a href="/admin" class="back">← Back to Dashboard</a>
</div>

</body>
</html>
