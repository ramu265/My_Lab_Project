<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            flex-direction:column;
            background: linear-gradient(135deg,#667eea,#764ba2);
        }

        h2{
            text-align:center;
            color:white;
            padding:30px 0;
            font-size:32px;
        }

        .container{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .dashboard{
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
            gap:25px;
            width:90%;
            max-width:900px;
        }

        .card{
            background:white;
            padding:40px 20px;
            text-align:center;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-decoration:none;
            color:#333;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-10px);
            box-shadow:0 15px 35px rgba(0,0,0,0.3);
            background:#f3f4ff;
        }

        .logout{
            background:#ff4b5c;
            color:white;
        }

        .logout:hover{
            background:#d63031;
            color:white;
        }

        footer{
            text-align:center;
            color:white;
            padding:15px;
            font-size:14px;
        }
    </style>
</head>
<body>

<h2>Admin Dashboard</h2>

<div class="container">
    <div class="dashboard">

        <a href="/add_class" class="card">
            ➕ Add Class
        </a>

        <a href="/add_student" class="card">
            👨‍🎓 Add Student
        </a>

        <a href="/add_task" class="card">
            📝 Add Task
        </a>

        <a href="/report" class="card">
            📊 Generate Report
        </a>

        <a href="/view_classes" class="card">
            📚 View Classes
        </a>

        <a href="/" class="card logout">
            🚪 Logout
        </a>

    </div>
</div>

<footer>
     2026 Attendance Management System
</footer>

</body>
</html>
