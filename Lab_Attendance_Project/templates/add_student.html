<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
        }

        .container{
            width:420px;
            padding:40px;
            background:#111827;
            border-radius:20px;
            box-shadow:0 0 40px rgba(0,255,255,0.3);
        }

        h2{
            text-align:center;
            margin-bottom:30px;
            color:#00f5ff;
            font-weight:600;
            letter-spacing:1px;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group input,
        .input-group select{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#1f2937;
            color:white;
            font-size:14px;
            outline:none;
            transition:0.3s;
        }

        .input-group input:focus,
        .input-group select:focus{
            border:1px solid #00f5ff;
            box-shadow:0 0 10px #00f5ff;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:30px;
            background:linear-gradient(45deg,#00f5ff,#00ff88);
            color:#111;
            font-weight:bold;
            cursor:pointer;
            transition:0.4s;
        }

        button:hover{
            transform:scale(1.05);
            box-shadow:0 0 20px #00ffcc;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:20px;
            color:#00f5ff;
            text-decoration:none;
            font-size:14px;
            transition:0.3s;
        }

        .back:hover{
            color:#00ff88;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Add Student</h2>

    <form method="post">

        <div class="input-group">
            <input type="text" name="name" placeholder="Student Name" required>
        </div>

        <div class="input-group">
            <input type="text" name="password" placeholder="Password" required>
        </div>

        <div class="input-group">
            <select name="class_id" required>
                {% for c in classes %}
                <option value="{{c[0]}}">{{c[1]}}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit">Add Student</button>

    </form>

    <a href="/admin" class="back">← Back to Dashboard</a>
</div>

</body>
</html>
