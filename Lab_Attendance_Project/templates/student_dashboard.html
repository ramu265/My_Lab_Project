<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Consolas', monospace;
        }

        body{
            background:#0f2027;
            background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
            min-height:100vh;
            padding:40px;
            color:white;
        }

        h2{
            text-align:center;
            margin-bottom:40px;
            font-size:28px;
            letter-spacing:2px;
            color:#00ffcc;
            text-shadow:0 0 10px #00ffcc;
        }

        .table-container{
            max-width:1000px;
            margin:auto;
            background:rgba(0,0,0,0.6);
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,255,200,0.3);
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            padding:15px;
            text-align:left;
        }

        th{
            background:#00ffcc;
            color:black;
            font-weight:bold;
        }

        tr{
            border-bottom:1px solid rgba(255,255,255,0.1);
        }

        tr:hover{
            background:rgba(0,255,200,0.1);
            transition:0.3s;
        }

        .open-btn{
            padding:8px 15px;
            background:#00ffcc;
            color:black;
            border:none;
            border-radius:20px;
            text-decoration:none;
            font-weight:bold;
            transition:0.3s;
        }

        .open-btn:hover{
            background:#00cc99;
            box-shadow:0 0 10px #00ffcc;
        }

        .logout{
            display:block;
            width:200px;
            margin:40px auto 0;
            text-align:center;
            padding:10px;
            background:#ff4b2b;
            border-radius:25px;
            text-decoration:none;
            color:white;
            font-weight:bold;
            transition:0.3s;
        }

        .logout:hover{
            background:#ff1e00;
            box-shadow:0 0 15px red;
        }
    </style>
</head>
<body>

<h2>Student Dashboard</h2>

<div class="table-container">
    <table>
        <tr>
            <th>Task ID</th>
            <th>Question</th>
            <th>Action</th>
        </tr>

        {% for t in tasks %}
        <tr>
            <td>{{t[0]}}</td>
            <td>{{t[1]}}</td>
            <td>
                <a href="/compiler/{{t[0]}}" class="open-btn">Open</a>
            </td>
        </tr>
        {% endfor %}

    </table>
</div>

<a href="/" class="logout">Logout</a>

</body>
</html>
