<!DOCTYPE html>
<html>
<head>
    <title>View Classes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Mee original styles ikkada unchandi */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background: linear-gradient(135deg,#141e30,#243b55); min-height:100vh; padding:40px; color:white; }
        .container { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); padding:30px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align:center; margin-bottom:30px; font-size:28px; letter-spacing:1px; color:#00f2ff; text-shadow:0 0 10px #00f2ff; }
        table { width:100%; border-collapse:collapse; background:white; color:black; border-radius:10px; overflow:hidden; }
        th { background:#243b55; color:white; padding:12px; }
        td { padding:12px; text-align:center; border-bottom: 1px solid #ddd; }
        tr:nth-child(even) { background:#f2f2f2; }
        tr:hover { background:#ddd; transition:0.3s; }
        .open-btn { padding:8px 15px; border:none; border-radius:20px; background:#00f2ff; color:black; font-weight:bold; cursor:pointer; transition:0.3s; text-decoration: none; display: inline-block; }
        .delete-btn { padding:8px 15px; border:none; border-radius:20px; background:#ff4b2b; color:white; font-weight:bold; cursor:pointer; transition:0.3s; }
        .delete-btn:hover { background:#e63c1e; transform:scale(1.1); }
        .back-btn { margin-top:25px; display:inline-block; padding:10px 20px; background:#ff4b2b; color:white; text-decoration:none; border-radius:25px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📚 Select Class</h2>

    <table id="classTable">
        <tr>
            <th>Class ID</th>
            <th>Class Name</th>
            <th>Open</th>
            <th>Delete</th>
        </tr>

        {% for c in classes %}
        <tr id="row-{{c[0]}}">
            <td>{{c[0]}}</td>
            <td>{{c[1]}}</td>
            <td>
                <a href="/class_students/{{c[0]}}" class="open-btn">Open</a>
            </td>
            <td>
                <button class="delete-btn" onclick="deleteClass('{{c[0]}}')">Delete</button>
            </td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/admin" class="back-btn">⬅ Back</a>
</div>

<script>
async function deleteClass(classId) {
    if (confirm('Are you sure you want to delete this class? All students in this class might be affected.')) {
        try {
            // Backend ki delete request pampadam
            const response = await fetch(`/delete_class/${classId}`, {
                method: 'POST', // Security kosam POST use cheyadam better
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            });

            const data = await response.json();

            if (data.success) {
                // Row ni UI nundi remove cheyadam
                const row = document.getElementById(`row-${classId}`);
                row.style.transition = "0.5s";
                row.style.opacity = "0";
                setTimeout(() => row.remove(), 500);
                alert(data.message);
            } else {
                alert("Error: " + data.message);
            }
        } catch (error) {
            console.error('Error:', error);
            alert("Server error occurred!");
        }
    }
}
</script>

</body>
</html>
